<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | NSR Playoffs</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="predict.html">Make Picks</a>
        <a href="leaderboard.html" class="active">Leaderboard</a>
    </nav>
    <div class="container">
        <h1>🏆 Leaderboard</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search by player name..." 
                   aria-label="Search players">
            <button id="clearSearch" class="btn-small">Clear</button>
        </div>
        
        <div id="your-position" class="your-position hidden">
            <p>Your position: <span id="user-rank"></span> with <span id="user-points"></span> points</p>
        </div>
        
        <div id="loading">Loading standings...</div>
        
        <table id="leaderboard-table" style="display: none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Points</th>
                    <th>Tiebreaker Diff</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>
    <script src="assets/leaderboard.js"></script>
</body>
</html>
