<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Playoff Pick'em | The Homie Bowl</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏀 The Homie Bowl Playoffs</h1>
        <p class="subtitle">Live Leaderboard</p>
        
        <div id="loading">Loading standings...</div>
        
        <table id="leaderboard-table" style="display: none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Points</th>
                    <th>Tiebreaker Diff</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- JavaScript will fill this -->
            </tbody>
        </table>
        
        <div class="footer">
            <p>⬇️ Submit your picks below ⬇️</p>
            <!-- We'll embed the Google Form here in Step 3 -->
            <a href="#" class="btn" id="pick-link" target="_blank">Submit Picks (Google Form)</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
